[package]
name = "akeyless-api"
version = "0.1.0"
edition = "2021"
description = "Auto-generated Rust SDK for the Akeyless API (604 endpoints, 1334 types)"
license = "MIT"
authors = ["Pleme Team <team@pleme.io>"]
repository = "https://github.com/pleme-io/akeyless-api"
homepage = "https://github.com/pleme-io/akeyless-api"
keywords = ["akeyless", "secrets", "api", "sdk", "openapi"]
categories = ["api-bindings", "authentication"]

# Generated from: akeylesslabs/akeyless-go/api/openapi.yaml
# Generator: openapi-generator-cli 7.18.0 (rust client, reqwest library)
# Source spec: OpenAPI 3.0.0, Akeyless API v3.0

[dependencies]
serde = { version = "^1.0", features = ["derive"] }
serde_with = { version = "^3.8", default-features = false, features = ["base64", "std", "macros"] }
serde_json = "^1.0"
serde_repr = "^0.1"
url = "^2.5"
reqwest = { version = "^0.12", default-features = false, features = ["json", "multipart"] }

[features]
default = ["rustls-tls"]
native-tls = ["reqwest/native-tls"]
rustls-tls = ["reqwest/rustls-tls"]

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
